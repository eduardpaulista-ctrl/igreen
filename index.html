<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- ========================================== -->
    <!--  CONFIGURAÇÕES DE COMPARTILHAMENTO (SEO/OG) -->
    <!--  Altere os textos abaixo para personalizar  -->
    <!-- ========================================== -->
    
    <!-- Título da Página (Aparece na aba do navegador) -->
    <title>iGreen Energy - Simulação de Economia de Energia</title>
    
    <!-- Descrição para Buscadores (Google, etc.) -->
    <meta name="description" content="Simule agora sua economia de energia elétrica com a iGreen Energy. 100% digital, sem investimentos e de forma simples." />

    <!-- Ícone da Aba do Navegador (Favicon) -->
    <link rel="icon" type="image/png" href="https://webdu.com.br/wp-content/uploads/2026/07/Design-sem-nome-2.png" />
    <link rel="apple-touch-icon" href="https://webdu.com.br/wp-content/uploads/2026/07/Design-sem-nome-2.png" />

    <!-- Open Graph / Meta Tags para WhatsApp, Instagram, Facebook e LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="iGreen Energy - Simulação de Economia de Energia" />
    <meta property="og:description" content="Descubra quanto você pode economizar na sua conta de luz em menos de 2 minutos de forma 100% gratuita." />
    <!-- Imagem de pré-visualização (Aparece ao enviar o link no WhatsApp) -->
    <meta property="og:image" content="https://webdu.com.br/wp-content/uploads/2026/07/Design-sem-nome-2.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />

    <!-- Twitter / X Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="iGreen Energy - Simulação de Economia" />
    <meta name="twitter:description" content="Economize até 20% na sua conta de energia de forma inteligente e digital." />
    <meta name="twitter:image" content="https://webdu.com.br/wp-content/uploads/2026/07/Design-sem-nome-2.png" />

    <!-- ========================================== -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
